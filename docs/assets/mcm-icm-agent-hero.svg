<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MCM-ICM Agent animated workflow hero</title>
  <desc id="desc">An animated research workflow moving from problem files through planning, modeling, evidence, paper writing, and submission packaging.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.46" stop-color="#102B36"/>
      <stop offset="1" stop-color="#201A36"/>
    </linearGradient>
    <linearGradient id="line" x1="180" y1="211" x2="1100" y2="211" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace}
      .sans{font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif}
      .white{fill:#F8FAFC}
      .muted{fill:#B8C4D6}
      .dim{fill:#708198}
      .card{fill:url(#panel);stroke:#FFFFFF;stroke-opacity:.18}
      .hair{stroke:#FFFFFF;stroke-opacity:.16}
      .route{stroke:url(#line);stroke-width:4;stroke-linecap:round;stroke-dasharray:12 18;animation:dash 9s linear infinite}
      .pulse{animation:pulse 3.4s ease-in-out infinite;transform-origin:center}
      .floatA{animation:floatA 6s ease-in-out infinite}
      .floatB{animation:floatB 7s ease-in-out infinite}
      .floatC{animation:floatC 8s ease-in-out infinite}
      .spark{animation:spark 3.2s ease-in-out infinite}
      .spark2{animation:spark 3.2s ease-in-out .9s infinite}
      .spark3{animation:spark 3.2s ease-in-out 1.8s infinite}
      @keyframes dash{to{stroke-dashoffset:-180}}
      @keyframes pulse{0%,100%{opacity:.64;transform:scale(.94)}50%{opacity:1;transform:scale(1.04)}}
      @keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
      @keyframes floatC{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
      @keyframes spark{0%,100%{opacity:.22}50%{opacity:1}}
    </style>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <path d="M0 322 C180 285 244 368 415 321 C570 279 647 236 824 268 C989 298 1062 216 1280 245 V420 H0 V322Z" fill="#0F172A" fill-opacity=".36"/>
  <path d="M0 85 C213 126 297 45 466 82 C628 117 746 169 912 129 C1076 90 1142 55 1280 86" stroke="#FFFFFF" stroke-opacity=".08" stroke-width="2"/>

  <g transform="translate(72 68)">
    <text class="sans white" x="0" y="0" font-size="44" font-weight="760">MCM-ICM Agent</text>
    <text class="sans muted" x="1" y="38" font-size="18">Traceable multi-agent workflow for mathematical modeling contests.</text>
    <g transform="translate(0 72)">
      <rect width="122" height="32" rx="16" fill="#38BDF8" fill-opacity=".16" stroke="#38BDF8" stroke-opacity=".52"/>
      <text class="mono white" x="18" y="21" font-size="13">CLI-first</text>
      <rect x="136" width="168" height="32" rx="16" fill="#34D399" fill-opacity=".15" stroke="#34D399" stroke-opacity=".48"/>
      <text class="mono white" x="154" y="21" font-size="13">JSON config</text>
      <rect x="318" width="178" height="32" rx="16" fill="#F59E0B" fill-opacity=".14" stroke="#F59E0B" stroke-opacity=".48"/>
      <text class="mono white" x="336" y="21" font-size="13">evidence-first</text>
    </g>
  </g>

  <g transform="translate(118 205)">
    <path class="route" d="M64 8 H916"/>
    <circle class="pulse" cx="64" cy="8" r="9" fill="#38BDF8"/>
    <circle class="pulse" cx="234" cy="8" r="9" fill="#22C55E"/>
    <circle class="pulse" cx="405" cy="8" r="9" fill="#34D399"/>
    <circle class="pulse" cx="576" cy="8" r="9" fill="#A78BFA"/>
    <circle class="pulse" cx="746" cy="8" r="9" fill="#F59E0B"/>
    <circle class="pulse" cx="916" cy="8" r="9" fill="#F97316"/>
  </g>

  <g class="floatA" transform="translate(82 248)" filter="url(#soft)">
    <rect class="card" width="162" height="88" rx="16"/>
    <text class="mono dim" x="18" y="25" font-size="12">01 / INPUT</text>
    <text class="sans white" x="18" y="51" font-size="18" font-weight="700">Problem Pack</text>
    <text class="sans muted" x="18" y="72" font-size="13">PDF, data, notes</text>
  </g>

  <g class="floatB" transform="translate(252 246)" filter="url(#soft)">
    <rect class="card" width="162" height="88" rx="16"/>
    <text class="mono dim" x="18" y="25" font-size="12">02 / PLAN</text>
    <text class="sans white" x="18" y="51" font-size="18" font-weight="700">Direction Lock</text>
    <text class="sans muted" x="18" y="72" font-size="13">human-in-loop</text>
  </g>

  <g class="floatC" transform="translate(422 246)" filter="url(#soft)">
    <rect class="card" width="162" height="88" rx="16"/>
    <text class="mono dim" x="18" y="25" font-size="12">03 / MODEL</text>
    <text class="sans white" x="18" y="51" font-size="18" font-weight="700">Route Recipes</text>
    <text class="sans muted" x="18" y="72" font-size="13">solver contracts</text>
  </g>

  <g class="floatA" transform="translate(592 246)" filter="url(#soft)">
    <rect class="card" width="162" height="88" rx="16"/>
    <text class="mono dim" x="18" y="25" font-size="12">04 / EVIDENCE</text>
    <text class="sans white" x="18" y="51" font-size="18" font-weight="700">Source Graph</text>
    <text class="sans muted" x="18" y="72" font-size="13">claims and figures</text>
  </g>

  <g class="floatB" transform="translate(762 246)" filter="url(#soft)">
    <rect class="card" width="162" height="88" rx="16"/>
    <text class="mono dim" x="18" y="25" font-size="12">05 / PAPER</text>
    <text class="sans white" x="18" y="51" font-size="18" font-weight="700">LaTeX Draft</text>
    <text class="sans muted" x="18" y="72" font-size="13">claim-aware prose</text>
  </g>

  <g class="floatC" transform="translate(932 246)" filter="url(#soft)">
    <rect class="card" width="162" height="88" rx="16"/>
    <text class="mono dim" x="18" y="25" font-size="12">06 / QA</text>
    <text class="sans white" x="18" y="51" font-size="18" font-weight="700">Submission Zip</text>
    <text class="sans muted" x="18" y="72" font-size="13">reviewed artifacts</text>
  </g>

  <g transform="translate(833 68)">
    <rect class="card" width="350" height="132" rx="18"/>
    <path class="hair" d="M24 44 H326M24 82 H326"/>
    <text class="mono dim" x="24" y="30" font-size="12">WORKSPACE TRACE</text>
    <text class="mono muted" x="24" y="66" font-size="15">paper/claim_plan.json</text>
    <text class="mono muted" x="24" y="104" font-size="15">review/final_gate.json</text>
    <circle class="spark" cx="303" cy="61" r="5" fill="#34D399"/>
    <circle class="spark2" cx="303" cy="99" r="5" fill="#F59E0B"/>
  </g>

  <g transform="translate(1115 116)">
    <circle class="spark3" cx="0" cy="0" r="3" fill="#38BDF8"/>
    <circle class="spark2" cx="36" cy="-36" r="3" fill="#34D399"/>
    <circle class="spark" cx="68" cy="20" r="3" fill="#F59E0B"/>
  </g>
</svg>
